<!DOCTYPE html>
<!--
  Embed snippet for wanyichen.com (Google Sites).
  Insert → Embed → Embed code → paste this whole file → resize → Publish.
  Or iframe https://ivanium.com/wanyichen-embed.html directly.
  Three live, interactive project frames stacked vertically.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg: #1a1a1a;
    --fg2: #5c5c5c;
    --accent: #3a5a8c;
    --card: #ffffff;
    --border: rgba(0,0,0,0.10);
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 6px 20px rgba(0,0,0,0.06);
    --radius: 12px;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-display: Georgia, "Times New Roman", serif;
  }
  body { font-family: var(--font-body); color: var(--fg); padding: 8px; background: transparent; }
  .stack { display: flex; flex-direction: column; gap: 28px; max-width: 1000px; margin: 0 auto; }
  .frame {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .bar {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .bar .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .bar h2 { font-family: var(--font-display); font-size: 17px; font-weight: 400; line-height: 1.2; }
  .bar p { font-size: 12.5px; color: var(--fg2); line-height: 1.4; }
  .open {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none;
    border: 1px solid var(--border); border-radius: 99px; padding: 6px 12px;
    transition: background .18s;
  }
  .open:hover { background: rgba(58,90,140,.08); }
  .frame iframe { display: block; width: 100%; height: 520px; border: 0; background: #f4f3f1; }
  @media (max-width: 640px) {
    .frame iframe { height: 420px; }
    .bar p { display: none; }
  }
</style>
</head>
<body>
<div class="stack" id="stack"></div>
<script>
  var PROJECTS = [
    { title: "Fourier Canvas",
      desc: "Draw anything and watch it decomposed into rotating Fourier epicycles.",
      url: "https://fourier.ivanium.com/" },
    { title: "Isomorphic Keyboard",
      desc: "A piano layout where every chord shape is the same regardless of key.",
      url: "https://piano.ivanium.com/" },
    { title: "Harmonics",
      desc: "Visualize and synthesize harmonic overtones from layered sine waves.",
      url: "https://harmonics.ivanium.com/" },
  ];
  var openIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>';
  var stack = document.getElementById("stack");
  PROJECTS.forEach(function (p) {
    var d = document.createElement("div");
    d.className = "frame";
    d.innerHTML =
      '<div class="bar">' +
        '<div class="meta"><h2>' + p.title + '</h2><p>' + p.desc + '</p></div>' +
        '<a class="open" href="' + p.url + '" target="_blank" rel="noopener noreferrer">Open ' + openIcon + '</a>' +
      '</div>' +
      '<iframe src="' + p.url + '" loading="lazy" title="' + p.title + '" ' +
        'sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-popups"></iframe>';
    stack.appendChild(d);
  });
</script>
</body>
</html>
